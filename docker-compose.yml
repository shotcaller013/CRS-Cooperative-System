services:
  db:
    image: mysql:8.0
    container_name: crs_laravel_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: crs_laravel
      MYSQL_USER: crs_user
      MYSQL_PASSWORD: crs_pass
    ports:
      - "3313:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crs_laravel_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "9010:80"
    volumes:
      - ./backend/app:/var/www/html/app
      - ./backend/bootstrap/app.php:/var/www/html/bootstrap/app.php
      - ./backend/routes/api.php:/var/www/html/routes/api.php
      - ./backend/config/cors.php:/var/www/html/config/cors.php
      - ./backend/database/seeders:/var/www/html/database/seeders
      - backend_vendor:/var/www/html/vendor
    environment:
      APP_ENV: local
      APP_DEBUG: 'true'
      APP_URL: http://localhost:9010
      APP_KEY: ""
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: crs_laravel
      DB_USERNAME: crs_user
      DB_PASSWORD: crs_pass
      SANCTUM_STATEFUL_DOMAINS: localhost:5177

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: crs_laravel_frontend
    restart: unless-stopped
    ports:
      - "5177:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    environment: {}

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: crs_laravel_phpmyadmin
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8087:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306

volumes:
  db_data:
    name: crs_laravel_db_data
  backend_vendor:
    name: crs_laravel_backend_vendor
  frontend_node_modules:
    name: crs_laravel_frontend_node_modules
